name: Validate Translations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install validation dependencies
        run: python -m pip install jsonschema

      - name: Lint scripts
        run: npm run lint

      - name: Run translation tests
        run: npm test

      - name: Build dist
        run: npm run build

      - name: Validate manifest.json
        run: |
          python -c "
          import json
          with open('manifest.json') as f:
              data = json.load(f)
          assert 'name' in data
          assert 'version' in data
          assert 'locales' in data
          print('manifest.json is valid')
          "

      - name: Run Flyto verify gate
        run: |
          python -m pip install git+https://github.com/flytohub/flyto-indexer.git
          flyto-index verify . --json

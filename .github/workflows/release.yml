name: Release Language Pack

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Validate before release
        run: |
          python scripts/validate.py --strict

      - name: Package locales
        run: |
          mkdir -p release
          # Package each project separately
          for project in cloud modules landing shared; do
            if [ -d "locales/$project" ]; then
              zip -r "release/flyto-i18n-${project}-${{ github.ref_name }}.zip" "locales/$project" manifest.json
            fi
          done
          # Package all locales together
          zip -r "release/flyto-i18n-all-${{ github.ref_name }}.zip" locales manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release/*.zip
          generate_release_notes: true

name: Build Dist

on:
  push:
    branches: [main]
    paths:
      - 'locales/**'
      - 'seo/**'
      - 'scripts/build-dist.py'
      - 'scripts/build-seo-manifest.py'
      - 'scripts/i18n_contract.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Build dist
        run: |
          python scripts/build-dist.py
          python scripts/build-seo-manifest.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- dist/ manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push dist
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ manifest.json
          git commit -m "build: auto-rebuild dist from locale changes"
          git push

      - name: Purge jsDelivr cache
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Purging jsDelivr CDN cache..."
          for scope in cloud landing app code console data engine; do
            while IFS= read -r locale_file; do
              locale="$(basename "$locale_file" .json)"
              [ "$locale" = "manifest" ] && continue
              curl -s "https://purge.jsdelivr.net/gh/flytohub/flyto-i18n@main/dist/$scope/$locale.json" > /dev/null
              echo "  Purged dist/$scope/$locale.json"
            done < <(find "dist/$scope" -maxdepth 1 -type f -name '*.json' -print)
            curl -s "https://purge.jsdelivr.net/gh/flytohub/flyto-i18n@main/dist/$scope/manifest.json" > /dev/null
            echo "  Purged dist/$scope/manifest.json"
          done
          curl -s "https://purge.jsdelivr.net/gh/flytohub/flyto-i18n@main/dist/manifest.json" > /dev/null
          echo "  Purged dist/manifest.json"
          echo "CDN cache purge complete"

name: Check dist freshness

# Fails the PR when locales/ changed but dist/ wasn't rebuilt locally.
# The Build Dist workflow auto-fixes this on main, but a stale-dist PR
# means CDN serves the old translations between merge and the next build.
# Forcing the contributor to rebuild locally keeps the dist consistent
# at every commit.

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'locales/**'
      - 'seo/**'
      - 'dist/**'
      - 'scripts/build-dist.py'
      - 'scripts/build-seo-manifest.py'
      - 'scripts/i18n_contract.py'
      - '.github/workflows/check-dist-fresh.yml'
  # Also gate direct pushes. Without this, a bypassed-PR push leaves
  # the CDN serving stale dist until build-dist.yml auto-fixes,
  # which is exactly the gap audit 2026-05-17 found (code project
  # had ~640-key drift across the long tail for weeks).
  push:
    branches: [main]
    paths:
      - 'locales/**'
      - 'seo/**'
      - 'dist/**'
      - 'scripts/build-dist.py'
      - 'scripts/build-seo-manifest.py'
      - 'scripts/i18n_contract.py'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'

      - name: Rebuild dist into a working copy
        run: |
          python scripts/build-dist.py
          python scripts/build-seo-manifest.py

      - name: Diff against committed distribution metadata
        id: diff
        run: |
          if git diff --quiet -- dist/ manifest.json; then
            echo "✓ dist/ and manifest.json are up to date"
          else
            echo "::error::distribution metadata is stale — rebuild locally and re-commit:"
            echo "::error::  python3 scripts/build-dist.py && git add dist/ manifest.json && git commit --amend --no-edit"
            git --no-pager diff --stat -- dist/ manifest.json
            exit 1
          fi

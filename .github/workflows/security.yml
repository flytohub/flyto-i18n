name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC — offset to avoid runner stampede
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Secret + Dependency scan
    uses: flytohub/.github/.github/workflows/reusable-security.yml@423fe8478c8b7e3d9481c61c65fc3d8e734fac5f # main 2026-07-22
    with:
      stack: static
    permissions:
      contents: read
    secrets: inherit

  sbom:
    name: SBOM (CycloneDX)
    uses: flytohub/.github/.github/workflows/reusable-sbom.yml@423fe8478c8b7e3d9481c61c65fc3d8e734fac5f # main 2026-07-22
    permissions:
      actions: read
      contents: write
      packages: read
      security-events: write
    secrets: inherit

  codeql-actions:
    name: CodeQL (GitHub Actions)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          languages: actions
          build-mode: none
          queries: security-extended

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          category: /language:actions

name: Notify Consumers

# After dist/ is updated on main, notify consuming projects so they can
# pull fresh translations. Each consumer repo listens for the
# `i18n-updated` repository_dispatch event and decides whether to
# auto-PR or just run a freshness check.
#
# Requires: FLYTO_PAT secret — a GitHub PAT with `repo` scope that can
# dispatch events to flytohub/flyto-cloud and flytohub/flyto-code.
# If the secret is missing the steps will be skipped (not fail the build).

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # Skip entirely if no PAT configured — avoids noisy failures
    if: ${{ secrets.FLYTO_PAT != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: dist/manifest.json
          sparse-checkout-cone-mode: false

      - name: Read manifest version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('dist/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Manifest version: $VERSION"

      - name: Notify flyto-cloud
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FLYTO_PAT }}
          repository: flytohub/flyto-cloud
          event-type: i18n-updated
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "ref": "${{ github.sha }}"}'

      - name: Notify flyto-code
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FLYTO_PAT }}
          repository: flytohub/flyto-code
          event-type: i18n-updated
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "ref": "${{ github.sha }}"}'

      - name: Notify flyto-engine
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FLYTO_PAT }}
          repository: flytohub/flyto-engine
          event-type: i18n-updated
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "ref": "${{ github.sha }}"}'

      - name: Summary
        run: |
          echo "## i18n Consumer Notification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Notified consuming projects of dist/ update:" >> $GITHUB_STEP_SUMMARY
          echo "- flyto-cloud (i18n-updated)" >> $GITHUB_STEP_SUMMARY
          echo "- flyto-code (i18n-updated)" >> $GITHUB_STEP_SUMMARY
          echo "- flyto-engine (i18n-updated)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Manifest version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

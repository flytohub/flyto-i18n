name: Notify Docs to Regenerate

on:
  push:
    branches: [main]
    paths:
      - 'locales/**/modules.*.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger flyto-docs regeneration
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_ACCESS_TOKEN }}" \
            https://api.github.com/repos/flytohub/flyto-docs/dispatches \
            -d '{"event_type":"flyto-i18n-updated"}'
